  const meta = course ? COURSE_META[course] : COURSE_META.CA;
  const portal = course ? OFFICIAL_PORTALS[course] : null;
  const nk = (c,l,s) => c+"__"+l+"__"+s;
  const getNote = (c,l,s) => notes[nk(c,l,s)] || "# "+s+"\n\nStart your notes here...\n\n## Key Concepts\n- \n\n## Important Points\n- \n\n## Amendments / Updates\n- ";
  const saveNote = (v) => { setNotes(p=>({...p,[nk(course,level,subject)]:v})); showToast("Saved ✓"); };
  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(null),2200); };

  const allSubjects = () => {
    if(!course) return [];
    return Object.entries(OFFICIAL_PORTALS[course].books).flatMap(([lv,subs])=>
      subs.map(s=>({level:lv,subject:s.subject,module:s.module,k:nk(course,lv,s.subject)}))
    );
  };

    const data = SYLLABUS_DATA[syllabusCourse]?.[syllabusLevel] || {};

    .level-btn:active{background:#1c1916}
    .lv-left{display:flex;align-items:center;gap:10px}
    .lv-tag{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700}
    .lv-count{font-size:11px;color:#5a5248}
    .lv-pills{display:flex;flex-wrap:wrap;gap:5px}
    .lv-pill{background:rgba(255,255,255,.04);border:1px solid #252220;color:#7a7060;font-size:10px;padding:2px 8px;border-radius:20px}
    .lv-pill.muted{color:#3a3530}
    .lv-arr{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:#3a3530;font-size:16px}
    .tab-row{display:flex;margin:14px 14px 0;gap:8px}
    .tab{flex:1;background:#141210;border:1px solid #252220;color:#6a6258;padding:9px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer}
    .tab.active{color:#fff;font-weight:600}
    .search-wrap{margin:14px 14px 0;background:#141210;border:1px solid #252220;border-radius:10px;display:flex;align-items:center;padding:0 12px;gap:8px}
    .si{color:#4a4540;font-size:17px}
    .search-wrap input{background:none;border:none;outline:none;color:#ede9e0;font-size:13px;padding:11px 0;flex:1}
    .search-wrap input::placeholder{color:#3a3530}
    .subs-list{padding:12px 14px 0;display:flex;flex-direction:column;gap:8px}
    .sub-row{background:#141210;border:1px solid #252220;border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;width:100%}
    .sub-row:active{background:#1c1916}
    .sr-num{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;min-width:28px}
    .sr-info{flex:1}
    .sr-name{font-size:14px;font-weight:500;color:#ddd8cc;margin-bottom:2px}
    .sr-meta{font-size:11px;color:#4a4540}
    .sr-arr{color:#3a3530;margin-left:auto;font-size:15px}
    .books-list{padding:12px 14px 0;display:flex;flex-direction:column;gap:8px}
    .books-header{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#5a5248;padding:4px 2px 8px}
    .portal-mini-link{text-decoration:none;font-weight:600;font-size:11px}
    .book-row{background:#141210;border:1px solid #252220;border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px}
    .book-module{font-size:11px;font-weight:700;min-width:52px;text-align:center}
    .book-info{flex:1}
    .book-name{font-size:13px;font-weight:500;color:#ddd8cc;margin-bottom:2px}
    .book-hint{font-size:10px;color:#4a4540}
    .book-dl{color:#fff;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap}
    .editor-screen{display:flex;flex-direction:column;min-height:100vh}
    .syllabus-ref{margin:12px 14px 0;background:#141210;border:1px solid rgba(255,255,255,.06);border-left:2px solid;border-radius:10px;padding:10px 13px}
    .sr-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
    .sr-chapters{display:flex;flex-wrap:wrap;gap:5px}
    .sr-chip{background:rgba(255,255,255,.04);border:1px solid #252220;color:#7a7060;font-size:10px;padding:2px 8px;border-radius:20px}
    .editor-body{flex:1;padding:14px;overflow-y:auto}
    .note-ta{width:100%;min-height:380px;background:#141210;border:1px solid #252220;border-radius:12px;color:#ede9e0;font-size:13px;line-height:1.9;padding:14px;resize:vertical;outline:none}
    .note-view{line-height:1.8}
    .nv-h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;margin:16px 0 8px;border-bottom:1px solid #252220;padding-bottom:4px}
    .nv-h2{font-size:14px;font-weight:600;color:#ccc8bc;margin:14px 0 6px}
    .nv-p{font-size:13px;color:#9a9080;margin-bottom:6px}
    .nv-li{font-size:13px;color:#9a9080;margin-left:18px;margin-bottom:4px;list-style:disc}
    .editor-foot{padding:12px 14px;background:#141210;border-top:1px solid #252220;display:flex;gap:8px}
    .save-btn{flex:1;color:#fff;border:none;padding:11px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer}
    .prt-btn{flex:1;background:#1c1916;border:1px solid #252220;color:#8a8070;padding:11px;border-radius:9px;font-size:13px;cursor:pointer}
    .pdf-btn{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:11px;border-radius:9px;font-size:12px;font-weight:600;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center}
    .edit-tog{background:none;border:1px solid #252220;color:#8a8070;padding:6px 12px;border-radius:8px;font-size:16px;cursor:pointer}
    .edit-tog.on{background:rgba(90,200,80,.15);border-color:rgba(90,200,80,.3);color:#5ac850}
    .print-list{padding:14px;display:flex;flex-direction:column;gap:8px}
    .print-row{display:flex;align-items:center;gap:12px;background:#141210;border:1px solid #252220;border-radius:12px;padding:13px 15px;cursor:pointer}
    .print-row.checked{background:rgba(255,255,255,.03)}
    .print-row input{width:15px;height:15px;cursor:pointer;flex-shrink:0}
    .pr-info{flex:1}
    .pr-level{display:block;font-size:10px;color:#4a4540;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
    .pr-subject{font-size:13px;font-weight:500;color:#ccc8bc}
    .pr-badge{background:rgba(90,200,80,.1);border:1px solid rgba(90,200,80,.2);color:#5ac850;font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#252220;border:1px solid #3a3530;color:#ede9e0;padding:9px 20px;border-radius:30px;font-size:12px;z-index:99;white-space:nowrap}
    @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  `;

  const Home = () => (
    <div className="screen">
      <div className="hero">
        <div className="hero-glow"/>
        <span className="hero-tag">CA · CS · CMA</span>
        <h1>Study<em>Vault</em></h1>
        <p>Official modules · Smart notes · Print-ready summaries</p>
      </div>
      <div className="section-label">Choose Your Course</div>
      <div className="course-grid">
        {Object.entries(COURSE_META).map(([k,v])=>(
          <button key={k} className="course-card" style={{borderLeft:"3px solid "+v.color}} onClick={()=>{setCourse(k);setScreen("dashboard");}}>
            <div className="cc-badge" style={{background:v.color}}>{k}</div>
            <div className="cc-body"><div className="cc-name">{v.label}</div><div className="cc-inst">{v.institute}</div></div>
            <div className="cc-arr">→</div>
          </button>
        ))}
      </div>
      <div className="section-label" style={{marginTop:24}}>Syllabus Overview PDF</div>
      <div className="syllabus-card">
        <div className="syllabus-card-top">
          <span className="syllabus-icon">📋</span>
          <div><div className="syllabus-title">Generate Syllabus PDF</div><div className="syllabus-desc">Chapter-wise tabular overview for any course & level</div></div>
        </div>
        <div className="syl-selects">
          <select value={syllabusCourse} onChange={e=>{setSyllabusCourse(e.target.value);setSyllabusLevel(Object.keys(SYLLABUS_DATA[e.target.value])[0]);}}>
            {Object.keys(SYLLABUS_DATA).map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select value={syllabusLevel} onChange={e=>setSyllabusLevel(e.target.value)}>
            {Object.keys(SYLLABUS_DATA[syllabusCourse]||{}).map(l=><option key={l} value={l}>{l}</option>)}
          </select>
        </div>
        <button className="syl-btn" onClick={generateSyllabusPDF}>📄 Generate & Print PDF</button>
      </div>
      <div className="stats-row">
        <div className="stat"><span>{Object.keys(notes).length}</span><label>Notes</label></div>
        <div className="stat"><span>3</span><label>Courses</label></div>
        <div className="stat"><span>40+</span><label>Subjects</label></div>
        <div className="stat"><span>∞</span><label>Free PDFs</label></div>
      </div>
    </div>
  );

  const Dashboard = () => {
    const p=OFFICIAL_PORTALS[course]; const m=COURSE_META[course];
    return (
      <div className="screen">
        <div className="topbar">
          <button className="back" onClick={()=>setScreen("home")}>←</button>
          <div className="topbar-title"><span className="tb-badge" style={{color:m.color}}>{course}</span><span className="tb-name">{m.label}</span></div>
          <button className="icon-btn" style={{background:m.color}} onClick={()=>setScreen("print")}>🖨</button>
        </div>
        <div className="portal-banner" style={{borderLeft:"3px solid "+m.color}}>
          <div>
            <div className="portal-inst" style={{color:m.color}}>{p.institute}</div>
            <div className="portal-label">Official Study Material Portal</div>
            <a href={p.mainPortal} target="_blank" rel="noopener noreferrer" className="portal-link" style={{background:m.light,color:m.color}}>🔗 {p.label} ↗</a>
          </div>
          <div className="portal-steps">
            {p.downloadSteps.map((s,i)=>(
              <div key={i} className="portal-step"><span style={{background:m.color}}>{i+1}</span>{s}</div>
            ))}
          </div>
        </div>
        <div className="section-label">Select Level</div>
        <div className="levels-list">
          {Object.keys(p.books).map((lv,i)=>(
            <button key={lv} className="level-btn" onClick={()=>{setLevel(lv);setActiveTab("notes");setScreen("subjects");}}>
              <div className="lv-left"><span className="lv-tag" style={{color:m.color}}>{lv}</span><span className="lv-count">{p.books[lv].length} subjects</span></div>
              <div className="lv-pills">
                {p.books[lv].slice(0,3).map(b=><span key={b.subject} className="lv-pill">{b.subject.split(" ").slice(0,2).join(" ")}</span>)}
                {p.books[lv].length>3&&<span className="lv-pill muted">+{p.books[lv].length-3}</span>}
              </div>
              <span className="lv-arr">→</span>
            </button>
          ))}
        </div>
      </div>
    );
  };

  const Subjects = () => {
    const subs=OFFICIAL_PORTALS[course].books[level]||[]; const m=COURSE_META[course];
    const filtered=subs.filter(s=>s.subject.toLowerCase().includes(search.toLowerCase()));
    return (
      <div className="screen">
        <div className="topbar">
          <button className="back" onClick={()=>{setSearch("");setScreen("dashboard");}}>←</button>
          <div className="topbar-title"><span className="tb-badge" style={{color:m.color}}>{course} · {level}</span><span className="tb-name">Subjects</span></div>
        </div>
        <div className="search-wrap"><span className="si">⌕</span><input placeholder="Search subjects…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div className="tab-row">
          <button className={"tab"+(activeTab==="notes"?" active":"")} style={activeTab==="notes"?{background:m.color,borderColor:m.color}:{}} onClick={()=>setActiveTab("notes")}>✎ Notes</button>
          <button className={"tab"+(activeTab==="books"?" active":"")} style={activeTab==="books"?{background:m.color,borderColor:m.color}:{}} onClick={()=>setActiveTab("books")}>📚 Official Books</button>
        </div>
        {activeTab==="books"?(
          <div className="books-list">
            <div className="books-header"><span>Access {OFFICIAL_PORTALS[course].institute} material</span><a href={OFFICIAL_PORTALS[course].mainPortal} target="_blank" rel="noopener noreferrer" className="portal-mini-link" style={{color:m.color}}>Open Portal ↗</a></div>
            {filtered.map((s,i)=>(
              <div key={s.subject} className="book-row">
                <div className="book-module" style={{color:m.color}}>{s.module}</div>
                <div className="book-info"><div className="book-name">{s.subject}</div><div className="book-hint">Free PDF via {OFFICIAL_PORTALS[course].label}</div></div>
                <a href={s.url} target="_blank" rel="noopener noreferrer" className="book-dl" style={{background:m.color}}>↗ Open</a>
              </div>
            ))}
          </div>
        ):(
          <div className="subs-list">
            {filtered.map((s,i)=>{
              const k=nk(course,level,s.subject); const hasNote=notes[k]!==undefined;
              return (
                <button key={s.subject} className="sub-row" onClick={()=>{setSubject(s.subject);setEditMode(false);setScreen("editor");}}>
                  <div className="sr-num" style={{color:m.color}}>{String(i+1).padStart(2,"0")}</div>
                  <div className="sr-info"><div className="sr-name">{s.subject}</div><div className="sr-meta">{s.module} · {hasNote?"✎ Custom notes":"📄 Ready to note"}</div></div>
                  <div className="sr-arr">→</div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  const Editor = () => {
    const content=getNote(course,level,subject); const m=COURSE_META[course];
    const sInfo=SYLLABUS_DATA[course]?.[level]?.[subject];
    return (
      <div className="screen editor-screen">
        <div className="topbar">
          <button className="back" onClick={()=>{setEditMode(false);setScreen("subjects");}}>←</button>
          <div className="topbar-title"><span className="tb-badge" style={{color:m.color}}>{course} · {level}</span><span className="tb-name">{subject}</span></div>
          <button className={"edit-tog"+(editMode?" on":"")} onClick={()=>setEditMode(e=>!e)}>{editMode?"👁":"✎"}</button>
        </div>
        {sInfo&&(
          <div className="syllabus-ref" style={{borderLeftColor:m.color}}>
            <div className="sr-label" style={{color:m.color}}>📖 Syllabus Reference</div>
            <div className="sr-chapters">
              {sInfo.chapters.slice(0,5).map(c=><span key={c} className="sr-chip">{c}</span>)}
              {sInfo.chapters.length>5&&<span className="sr-chip"style={{color:"#3a3530"}}>+{sInfo.chapters.length-5} more</span>}
            </div>
          </div>
        )}
        <div className="editor-body">
          {editMode?(
            <textarea ref={textRef} className="note-ta" defaultValue={content} onBlur={e=>saveNote(e.target.value)}/>
          ):(
            <div className="note-view">
              {content.split("\n").map((line,i)=>{
                if(line.startsWith("# ")) return <h2 key={i} className="nv-h1" style={{color:m.color}}>{line.slice(2)}</h2>;
                if(line.startsWith("## ")) return <h3 key={i} className="nv-h2">{line.slice(3)}</h3>;
                if(line.startsWith("- ")) return <li key={i} className="nv-li">{line.slice(2)}</li>;
                if(line.trim()==="") return <div key={i} style={{height:8}}/>;
                return <p key={i} className="nv-p">{line}</p>;
              })}
            </div>
          )}
        </div>
        <div className="editor-foot">
          {editMode&&<button className="save-btn" style={{background:m.color}} onClick={()=>saveNote(textRef.current?.value||content)}>💾 Save</button>}
          <button className="prt-btn" onClick={()=>{setPrintSel([nk(course,level,subject)]);setScreen("print");}}>🖨 Print</button>
          <a href={portal?.mainPortal} target="_blank" rel="noopener noreferrer" className="pdf-btn" style={{color:m.color}}>📚 Official PDF ↗</a>
        </div>
      </div>
    );
  };

  const Print = () => {
    const all=allSubjects(); const m=COURSE_META[course]||COURSE_META.CA;
    return (
      <div className="screen">
        <div className="topbar">
          <button className="back" onClick={()=>setScreen(subject?"editor":"dashboard")}>←</button>
          <div className="topbar-title"><span className="tb-badge" style={{color:m.color}}>Print Center</span><span className="tb-name">Select Notes</span></div>
          <button className="icon-btn" style={{background:printSel.length?m.color:"#333",opacity:printSel.length?1:0.4}} disabled={!printSel.length} onClick={()=>window.print()}>🖨 {printSel.length?`(${printSel.length})`:""}</button>
        </div>
        <div className="print-list">
          {all.map(({level:lv,subject:sub,module,k})=>{
            const checked=printSel.includes(k); const hasNote=notes[k]!==undefined;
            return (
              <label key={k} className={"print-row"+(checked?" checked":"")} style={checked?{borderColor:m.color}:{}}>
                <input type="checkbox" checked={checked} onChange={()=>setPrintSel(p=>checked?p.filter(x=>x!==k):[...p,k])}/>
                <div className="pr-info"><span className="pr-level">{lv} · {module}</span><span className="pr-subject">{sub}</span></div>
                {hasNote&&<span className="pr-badge">✎ Notes</span>}
              </label>
            );
          })}
        </div>
        <div id="parea" style={{display:"none"}}>
          {printSel.map(k=>{
            const [c,l,s]=k.split("__");
            return (
              <div key={k} style={{pageBreakAfter:"always",padding:32,fontFamily:"Georgia,serif"}}>
                <div style={{borderBottom:"2px solid #333",paddingBottom:8,marginBottom:16}}>
                  <h1 style={{margin:0,fontSize:24}}>{s}</h1>
                  <p style={{margin:"4px 0 0",color:"#666"}}>{c} · {l} | {OFFICIAL_PORTALS[c]?.institute}</p>
                </div>
                <pre style={{whiteSpace:"pre-wrap",fontFamily:"inherit",lineHeight:1.9,fontSize:14}}>{getNote(c,l,s)}</pre>
              </div>
            );
          })}
        </div>
        <style>{`@media print { body > * { display:none!important } #parea { display:block!important } }`}</style>
      </div>
    );
  };

  return (
    <div className="app">
      <style>{css}</style>
      {screen==="home"&&<Home/>}
      {screen==="dashboard"&&<Dashboard/>}
      {screen==="subjects"&&<Subjects/>}
      {screen==="editor"&&<Editor/>}
      {screen==="print"&&<Print/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
